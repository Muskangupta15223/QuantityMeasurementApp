spring.application.name=quantity-measurement-app
server.port=8080

spring.profiles.active=prod
# DATABASE (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/quantitymeasurementdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=muskan@123

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hikari
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Logging
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG

# Swagger
springdoc.swagger-ui.enabled=true

# JWT
jwt.secretKey=${JWT_SECRET}

# OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

#actuator 
management.endpoints.web.exposure.include=health,metrics